<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimena Knack | Elegir fecha</title>
    
    <link rel="stylesheet" href="mobile-fixes.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --verde-mimar: #72bd99;
            --verde-oscuro: #4f9777;
            --verde-fondo: #f2f6f4;
            --crema: #fffdf9;
            --ink: #273630;
            --muted: #67736e;
            --border: #d9e5de;
            --card-gold: rgba(208,174,115,0.32);
            --card-shadow: 0 16px 38px rgba(29,51,42,0.11);
            --radius-xl: 24px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: 
                radial-gradient(circle at 8% 15%, rgba(114,189,153,0.18), transparent 38%),
                radial-gradient(circle at 90% 8%, rgba(114,189,153,0.12), transparent 32%),
                var(--verde-fondo);
            font-family: 'Montserrat', sans-serif;
            color: var(--ink);
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.42;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        /* Hero Section */
        .hero {
            display: grid;
            place-items: center;
            padding: 56px 16px 32px;
            background: linear-gradient(145deg, #e8f5ee 0%, #f2f6f4 42%, #eef8f2 100%);
            position: relative;
        }

        .logo-shell {
            width: clamp(128px, 26vw, 166px);
            height: clamp(128px, 26vw, 166px);
            margin: 0 auto 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.98) 0%, rgba(242,249,245,0.96) 100%);
            border: 1px solid rgba(90,144,119,0.18);
            box-shadow: 0 18px 36px rgba(41,66,56,0.12), inset 0 1px 0 rgba(255,255,255,0.92);
        }

        .logo {
            width: 74%;
            height: 74%;
            display: block;
            object-fit: cover;
            border-radius: 50%;
            filter: drop-shadow(0 8px 20px rgba(51,79,69,0.14));
        }

        .container {
            max-width: 1050px;
            margin: auto;
            padding: 24px 20px;
            text-align: center;
            position: relative;
        }

        /* Cards & Layout */
        .aviso-mio, .calendario, .card-recommendations {
            background: rgba(255,255,255,0.86);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(90,144,119,0.16);
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(10px);
            padding: 22px;
            margin-bottom: 30px;
        }

        .selection-title {
            margin: 0 0 10px;
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(26px, 3.4vw, 34px);
            line-height: 1.08;
            color: #2a4338;
        }

        /* Calendario Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .dia {
            padding: 12px 2px;
            border-radius: 12px;
            background: #f3f7f5;
            cursor: pointer;
            transition: all .18s ease;
            font-size: 13px;
            text-align: center;
            border: 1px solid #deebe5;
            font-weight: 500;
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .dia:hover {
            transform: translateY(-1px);
            border-color: #9acfb8;
            background: #ecf6f1;
            box-shadow: 0 8px 16px rgba(89,146,119,0.14);
        }

        .seleccionado {
            border: 2px solid var(--verde-mimar) !important;
            background: linear-gradient(180deg, #f3fbf7 0%, #e6f5ee 100%) !important;
            font-weight: 700;
            color: #244135;
        }

        .domingo, .pasado, .bloqueado {
            background: #eff2f1;
            color: #b1bab6;
            cursor: not-allowed;
            opacity: .72;
        }

        /* Horarios */
        .horarios {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .hora {
            background: white;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            border: 1px solid #d6e3dd;
            font-weight: 600;
            transition: all .18s ease;
        }

        .hora.selected {
            background: linear-gradient(135deg, #79c5a1 0%, #4f9f7b 100%);
            color: white;
            transform: translateY(-2px) scale(1.02);
        }

        .boton {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #77c39f 0%, #4e9f7b 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(63,143,111,0.28);
        }

        /* Animaciones */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container > * { animation: fadeUp .42s ease both; }
    </style>
</head>
<body>

    <header class="hero">
        <div class="logo-shell">
            <img src="logo.png" alt="Espacio Mimar" class="logo">
        </div>
    </header>

    <div class="container">
        <h1 class="selection-title">Elegir fecha</h1>
        
        <div id="saldoStatus" class="badge-balance">
            Cargando estado de cuenta...
        </div>

        <section class="calendario">
            <div class="mes">
                <button id="prevMes">&lt;</button>
                <span id="mes">Abril 2026</span>
                <button id="nextMes">&gt;</button>
            </div>
            
            <div class="semana">
                <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
            </div>
            
            <div class="grid" id="calendarGrid">
                </div>

            <div class="horarios" id="horariosGrid">
                </div>

            <button class="boton" id="confirmarBtn" disabled>Confirmar Turno</button>
        </section>
    </div>

</body>
</html>
