<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elegir fecha | Espacio Mimar</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#f4f7f6;
font-family:Arial;
margin:0;
}


/* CONTENEDOR */

.container{

max-width:900px;

margin:40px auto;

padding:20px;

text-align:center;

}


/* LOGO */

.logo{

width:220px;

margin-bottom:10px;

}


/* TITULO */

h2{

margin-top:5px;

color:#2d3748;

}


/* TARJETA CALENDARIO */

.calendar{

background:white;

padding:35px;

border-radius:20px;

margin-top:20px;

box-shadow:0 10px 35px rgba(0,0,0,0.08);

}


/* HEADER CALENDARIO */

.calendar-header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

font-weight:bold;

}


/* GRID */

.calendar-grid{

display:grid;

grid-template-columns:repeat(7,1fr);

gap:12px;

}


/* DIAS */

.day{

aspect-ratio:1;

display:flex;

align-items:center;

justify-content:center;

background:#f8f9fa;

border-radius:12px;

cursor:pointer;

font-weight:bold;

transition:0.2s;

}


.day:hover{

background:#e9ecef;

}


/* DIA SELECCIONADO */

.day.selected{

border:2px solid #72bd99;

color:#72bd99;

}


/* DIA BLOQUEADO */

.day.blocked{

background:#ffe3e3;

border:2px solid #ff7675;

color:#d63031;

}


/* HORARIOS */

#horarios{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:10px;

margin-top:25px;

}


/* BOTON HORARIO */

.hora-btn{

padding:12px;

border-radius:10px;

border:1px solid #ddd;

background:white;

cursor:pointer;

transition:0.2s;

}


.hora-btn:hover{

background:#f0f0f0;

}


.hora-btn.selected{

background:#72bd99;

color:white;

border:none;

}


/* BOTON PRINCIPAL */

.btn-principal{

margin-top:30px;

background:#72bd99;

color:white;

border:none;

padding:15px;

border-radius:12px;

width:100%;

cursor:pointer;

font-weight:bold;

font-size:16px;

transition:0.2s;

}


.btn-principal:hover{

background:#63a987;

}

</style>

</head>

<body>

<div class="container">

<img src="img/logo.png" class="logo">

<h2 id="titulo-servicio"></h2>

<div class="calendar">

<div class="calendar-header">

<button id="prevMonth">◀</button>

<div id="monthLabel"></div>

<button id="nextMonth">▶</button>

</div>

<div class="calendar-grid" id="calendarGrid"></div>

</div>

<div id="horarios"></div>

<button id="btn-finalizar" class="btn-principal">

Reservar turno

</button>

</div>


<script type="module">

import { db } from "./js/firebase.js";

import {

collection,

query,

where,

getDocs,

addDoc,

doc,

getDoc

}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


/* PARAMETROS */

const params=new URLSearchParams(window.location.search);

const servicioId=params.get("sid");

const servicioNombre=decodeURIComponent(params.get("servicio")||"Servicio");

document.getElementById("titulo-servicio").innerText=servicioNombre;


/* CLIENTE */

const userDni=sessionStorage.getItem("userDni");

let clientName="";

let clientEmail="";


if(userDni){

const snap=await getDoc(doc(db,"clients",userDni));

if(snap.exists()){

clientName=snap.data().fullName;

clientEmail=snap.data().email;

}

}


/* DIAS BLOQUEADOS */

const fechasBloqueadas=["2026-04-03"];

const motivosBloqueo={

"2026-04-03":"Viernes Santo"

};


/* CALENDARIO */

let current=new Date();

const grid=document.getElementById("calendarGrid");

const label=document.getElementById("monthLabel");


function renderCalendar(){

grid.innerHTML="";

const year=current.getFullYear();

const month=current.getMonth();

label.innerText=current.toLocaleString("es",{month:"long",year:"numeric"});


const firstDay=new Date(year,month,1).getDay();

const days=new Date(year,month+1,0).getDate();


for(let i=0;i<firstDay;i++){

const empty=document.createElement("div");

grid.appendChild(empty);

}


for(let d=1;d<=days;d++){

const day=document.createElement("div");

day.className="day";

day.innerText=d;


const fecha=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;


if(fechasBloqueadas.includes(fecha)){

day.classList.add("blocked");

}


day.onclick=()=>{

if(fechasBloqueadas.includes(fecha)){

alert("Día cerrado: "+motivosBloqueo[fecha]);

return;

}

selectDay(day,d);

};


grid.appendChild(day);

}

}


renderCalendar();


document.getElementById("prevMonth").onclick=()=>{

current.setMonth(current.getMonth()-1);

renderCalendar();

};


document.getElementById("nextMonth").onclick=()=>{

current.setMonth(current.getMonth()+1);

renderCalendar();

};


let fechaGlobal="";

let horaGlobal="";


function selectDay(el,day){

document.querySelectorAll(".day")

.forEach(d=>d.classList.remove("selected"));

el.classList.add("selected");


const y=current.getFullYear();

const m=String(current.getMonth()+1).padStart(2,"0");

const d=String(day).padStart(2,"0");


fechaGlobal=`${y}-${m}-${d}`;

cargarHorarios(fechaGlobal);

}


/* HORARIOS */

async function cargarHorarios(fecha){

const container=document.getElementById("horarios");

container.innerHTML="Cargando...";


const q=query(collection(db,"reservas"),where("fecha","==",fecha));

const snap=await getDocs(q);


const ocupados=snap.docs.map(d=>d.data().hora);


container.innerHTML="";


const horarios=[

"07:00","08:00","09:00","10:00","11:00","12:00",

"12:30","16:00","17:00","18:00","19:00","20:00","20:30"

];


horarios.forEach(h=>{

const btn=document.createElement("button");

btn.className="hora-btn";

btn.innerText=h;


if(ocupados.includes(h)){

btn.disabled=true;

}


btn.onclick=()=>{

document.querySelectorAll(".hora-btn")

.forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");

horaGlobal=h;

};


container.appendChild(btn);

});

}


/* RESERVAR */

document.getElementById("btn-finalizar").onclick=async()=>{

if(!horaGlobal){

alert("Seleccioná horario");

return;

}


await addDoc(collection(db,"reservas"),{

clientId:userDni,

clientName,

clientEmail,

servicioId,

servicioNombre,

fecha:fechaGlobal,

hora:horaGlobal,

timestamp:new Date()

});


alert("Turno reservado correctamente");

window.location.href="index.html";

};

</script>

</body>

</html>
