<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elegir fecha | Espacio Mimar</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root{ --verde-mimar:#72bd99; --verde-oscuro:#3f8f6f; --verde-fondo:#e8f5ee; }
        *{ box-sizing:border-box }
        body{ margin:0; background:#f4f7f6; font-family:'Montserrat',sans-serif; color:#2c3e3a; overflow-x:hidden; }
        .hero{ width:100%; display:flex; justify-content:center; position:relative }
        .hero img{ width:100%; max-height:260px; object-fit:cover }
        .container{ max-width:1050px; margin:auto; padding:20px; text-align:center; margin-top:-80px; position:relative }
        .logo{ width:280px; max-width:80%; margin-bottom:15px; display:block; margin-left:auto; margin-right:auto }
        .aviso-mio{ background:white; border-radius:20px; padding:20px; margin-bottom:20px; box-shadow:0 10px 30px rgba(0,0,0,0.05); text-align:center; border:1px solid #e0e0e0 }
        #saldoStatus{ font-weight:600; color:var(--verde-oscuro); background:var(--verde-fondo); display:inline-block; padding:10px 20px; border-radius:30px; margin-bottom:20px; border:1px solid var(--verde-mimar); font-size:13px }
        .calendario{ background:white; border-radius:20px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.08); margin-bottom:30px; width:100% }
        .mes{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; font-weight:600 }
        .mes button{ border:none; background:var(--verde-mimar); color:white; padding:8px 15px; border-radius:8px; cursor:pointer }
        .semana{ display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:10px; font-weight:600; color:#666; font-size:11px }
        .grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px }
        .dia{ padding:12px 2px; border-radius:10px; background:#f1f1f1; cursor:pointer; transition:.2s; font-size:13px; text-align:center; border:2px solid transparent }
        .seleccionado{ border:2px solid var(--verde-mimar)!important; background:var(--verde-fondo)!important; font-weight:bold }
        .domingo,.pasado,.bloqueado{ background:#eee; color:#bbb; cursor:not-allowed; opacity:.6 }
        .horarios{ display:grid; grid-template-columns:repeat(auto-fill,minmax(85px,1fr)); gap:10px; margin-top:20px }
        .hora{ background:white; border-radius:10px; padding:12px; cursor:pointer; border:1px solid #ddd; text-align:center; font-size:14px }
        .hora.selected{ background:var(--verde-mimar); color:white }
        .hora.ocupado{ background:#ffebee!important; color:#d32f2f!important; cursor:not-allowed!important; text-decoration:line-through!important; border:1px solid #d32f2f!important; pointer-events:none!important }
        .boton{ width:100%; padding:18px; background:var(--verde-mimar); border:none; border-radius:12px; color:white; font-size:16px; cursor:pointer; font-weight:600; margin-top:20px }
        .boton:disabled{ background:#ccc }
        .modal-mimar{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center; z-index:9999; backdrop-filter:blur(4px); padding:20px }
        .modal-box{ background:white; padding:25px; border-radius:20px; text-align:center; max-width:400px; width:100% }
    </style>
</head>
<body>
<div class="hero"><img src="img/fecha.jpeg"></div>
<div class="container">
    <img src="img/logo.png" class="logo">
    <div id="saldoStatus">Verificando balance...</div>
    
    <div class="aviso-mio">
        <h3>Reserva tu turno</h3>
        <p style="font-size: 0.85rem; color: #666;">Seleccioná un día del calendario para ver horarios.</p>
    </div>

    <div class="calendario">
        <div class="mes"><button id="btnMesAnterior">◀</button><div id="mes"></div><button id="btnMesSiguiente">▶</button></div>
        <div class="semana"><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div></div>
        <div class="grid" id="dias"></div>
    </div>

    <div class="horarios" id="horarios"></div>
    <button class="boton" id="reservarBtn" disabled>Confirmar Reserva</button>
</div>

<div id="modalMimar" class="modal-mimar">
    <div class="modal-box">
        <h4 id="modalTitulo" style="font-family:'Playfair Display'; color:var(--verde-oscuro); margin-top:0;">Aviso</h4>
        <p id="modalMsg" style="font-size:14px;"></p>
        <button id="btnFinalizarModal" class="boton" style="margin-top:10px;">Entendido</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

const firebaseConfig={ projectId:"estetica-8d067", apiKey:"AIzaSyBc5435tsDnJ_yJqO1ppwSjxSpCIhpjgew" };
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const CONFIG_DIAS = {
    "lunes": { normal: ["16:00", "17:00", "18:00", "19:00"], fraccionado: ["20:00", "20:30"] },
    "martes": { 
        normal: ["07:00", "08:00", "09:00", "10:00", "11:00", "16:00", "17:00", "18:00", "19:00"], 
        fraccionado: ["12:00", "12:30", "20:00", "20:30"] 
    },
    "miercoles": { normal: ["15:00", "16:00", "17:00", "18:00", "19:00"], fraccionado: ["20:00", "20:30"] },
    "jueves": { normal: ["08:00", "09:00", "10:00", "11:00"], fraccionado: ["12:00", "12:30"] },
    "viernes": { normal: ["15:00", "16:00", "17:00", "18:00", "19:00"], fraccionado: [] },
    "sabado": { normal: ["08:00", "09:00", "10:00", "11:00"], fraccionado: ["12:00", "12:30"] }
};

let fechaActual=new Date();
let fechaSeleccionada=null, horaSeleccionada=null, duracionTurno=60, excepciones={};
const hoy=new Date(); hoy.setHours(0,0,0,0);
const dniUsuario=localStorage.getItem("clienteDNI");
const servicioGuardado=localStorage.getItem("servicioSeleccionado")||"";
const esMioUp=servicioGuardado.toLowerCase().includes("mio");

async function cargarDatos(){
    const snap=await getDoc(doc(db,"clients",dniUsuario));
    if(snap.exists()) document.getElementById("saldoStatus").innerText=`Tienes ${snap.data().hoursBalance} sesiones disponibles`;

    // CARGAR EXCEPCIONES (JUEVES Y VIERNES SANTO)
    const exSnap=await getDocs(collection(db,"calendarExceptions"));
    excepciones = {};
    exSnap.forEach(doc => { if(doc.data().active) excepciones[doc.id] = doc.data().reason; });

    renderCalendario();
}

function renderCalendario(){
    const y=fechaActual.getFullYear(); const m=fechaActual.getMonth();
    document.getElementById("mes").innerText=`${["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][m]} ${y}`;
    const contenedor=document.getElementById("dias"); contenedor.innerHTML="";
    const diasMes=new Date(y,m+1,0).getDate(); const primerDia=new Date(y,m,1).getDay();
    let offset=primerDia===0?6:primerDia-1;
    for(let i=0;i<offset;i++){ contenedor.appendChild(document.createElement("div")); }

    for(let d=1;d<=diasMes;d++){
        const fStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        let f=new Date(y,m,d); f.setHours(0,0,0,0);
        let div=document.createElement("div"); div.className="dia"; div.innerText=d;

        if(f.getDay()===0) div.classList.add("domingo");
        else if(f<hoy) div.classList.add("pasado");
        else if(excepciones[fStr]){
            div.classList.add("bloqueado");
            div.onclick=()=>mostrarAviso("Cerrado", `Motivo: ${excepciones[fStr]}`);
        } else {
            div.onclick=()=>{
                document.querySelectorAll(".dia").forEach(e=>e.classList.remove("seleccionado"));
                div.classList.add("seleccionado"); fechaSeleccionada=f; cargarHorarios(f, fStr);
            };
        }
        contenedor.appendChild(div);
    }
}

async function cargarHorarios(fecha, fStr){
    const container=document.getElementById("horarios");
    container.innerHTML="<p>Buscando turnos...</p>";

    if(excepciones[fStr]) { container.innerHTML=`<p style="color:red;">Día cerrado: ${excepciones[fStr]}</p>`; return; }

    const nombreDia=["domingo","lunes","martes","miercoles","jueves","viernes","sabado"][fecha.getDay()];
    const config = CONFIG_DIAS[nombreDia];
    if(!config) { container.innerHTML="<p>Cerrado</p>"; return; }

    const snapRes=await getDocs(query(collection(db,"reservas"),where("fecha","==",fStr)));
    const ocupados=snapRes.docs.map(doc=> (doc.data().hora||"").replace(" hs","").trim());
    container.innerHTML="";

    const todos = [
        ...config.normal.map(h => ({h, tipo:'normal'})),
        ...config.fraccionado.map(h => ({h, tipo:'fraccionado'}))
    ].sort((a,b) => a.h.localeCompare(b.h));

    todos.forEach(item => {
        let div=document.createElement("div"); div.className="hora"; div.innerText=item.h;
        
        // --- LÓGICA DE BLOQUEO EN CADENA ---
        let estaOcupado = ocupados.includes(item.h);
        
        // Si el de las 12:00 está libre pero el de las 12:30 está ocupado (o viceversa), marcamos AMBOS en rojo.
        if (!estaOcupado) {
            if (item.h === "12:00" && ocupados.includes("12:30")) estaOcupado = true;
            if (item.h === "12:30" && ocupados.includes("12:00")) estaOcupado = true;
            if (item.h === "20:00" && ocupados.includes("20:30")) estaOcupado = true;
            if (item.h === "20:30" && ocupados.includes("20:00")) estaOcupado = true;
        }

        if(estaOcupado) { 
            div.classList.add("ocupado"); 
        } else {
            div.onclick=()=>{
                if(!esMioUp && item.tipo==='fraccionado') {
                    const esInicio = (item.h==="12:00" || item.h==="20:00");
                    if(!esInicio) {
                        mostrarAviso("Bloque de 30 min", "Para una sesión normal de 1 hora, selecciona el horario de inicio (12:00 o 20:00).");
                        return;
                    }
                }
                horaSeleccionada=item.h;
                duracionTurno = (esMioUp && item.tipo==='fraccionado') ? 30 : 60;
                document.querySelectorAll(".hora").forEach(e=>e.classList.remove("selected"));
                div.classList.add("selected"); document.getElementById("reservarBtn").disabled=false;
            };
        }
        container.appendChild(div);
    });
}

function mostrarAviso(titulo, msg){
    document.getElementById("modalTitulo").innerText=titulo;
    document.getElementById("modalMsg").innerHTML=msg;
    document.getElementById("modalMimar").style.display="flex";
}

document.getElementById("btnFinalizarModal").onclick=()=>document.getElementById("modalMimar").style.display="none";

document.getElementById("reservarBtn").onclick=()=>{
    const fStr=`${fechaSeleccionada.getFullYear()}-${String(fechaSeleccionada.getMonth()+1).padStart(2,'0')}-${String(fechaSeleccionada.getDate()).padStart(2,'0')}`;
    localStorage.setItem("fechaSeleccionada", fStr);
    localStorage.setItem("horaSeleccionada", horaSeleccionada);
    localStorage.setItem("duracionSeleccionada", duracionTurno);
    window.location.href="confirmar.html";
};

document.getElementById("btnMesSiguiente").onclick=()=>{ fechaActual.setMonth(fechaActual.getMonth()+1); renderCalendario(); };
document.getElementById("btnMesAnterior").onclick=()=>{ fechaActual.setMonth(fechaActual.getMonth()-1); renderCalendario(); };
cargarDatos();
</script>
</body>
</html>
