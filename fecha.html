<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fecha y Hora</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

<style>
:root{
  --bg:#0f1115;
  --card:#161a21;
  --primary:#72bd99;
  --text:#ffffff;
  --soft:#9ca3af;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.header{
  padding:20px;
  font-size:1.2rem;
  font-weight:600;
  border-bottom:1px solid #222;
}

.section{
  padding:20px;
}

#calendar{
  width:100%;
}

.flatpickr-calendar{
  background:var(--card);
  color:white;
  border:none;
  width:100% !important;
  box-shadow:none;
}

.flatpickr-day{
  color:white;
  border-radius:12px;
}

.flatpickr-day.selected{
  background:var(--primary);
  border:none;
}

.flatpickr-day.today{
  border:1px solid var(--primary);
}

#horarios{
  margin-top:25px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.hora-btn{
  padding:16px;
  border-radius:14px;
  background:var(--card);
  border:1px solid #2a2f3a;
  color:white;
  font-size:1rem;
  cursor:pointer;
  transition:0.2s;
}

.hora-btn:hover{
  background:var(--primary);
  color:black;
}

.hora-btn.selected{
  background:var(--primary);
  color:black;
}

.btn-confirmar{
  margin-top:30px;
  width:100%;
  padding:18px;
  border-radius:18px;
  border:none;
  background:var(--primary);
  font-size:1rem;
  font-weight:600;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
  Seleccioná Fecha y Hora
</div>

<div class="section">

  <input type="text" id="calendar">

  <div id="horarios"></div>

  <button id="btn-finalizar" class="btn-confirmar">
    Confirmar Turno
  </button>

</div>

<script>
flatpickr("#calendar", {
  inline:true,
  locale:"es",
  minDate:"today"
});
</script>

</body>
</html>
