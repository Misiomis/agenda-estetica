<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="mobile-fixes.css">
<title>Gimena Knack | Servicios</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        :root { --verde-mimar: #72bd99; --verde-oscuro: #3f8f6f; --verde-fondo: #f4f7f6; }
        body { margin: 0; background: var(--verde-fondo); font-family: 'Montserrat', sans-serif; color: #333; overflow-x: hidden; }
        .hero { width: 100%; height: 200px; background: url("img/cabina.jpeg") center center/cover no-repeat; display: flex; align-items: center; justify-content: center; position: relative; }
        .hero::after { content: ""; position: absolute; inset: 0; background: rgba(44, 62, 58, 0.3); }
        .hero h1 { position: relative; z-index: 1; font-family: 'Playfair Display', serif; color: white; font-size: 38px; letter-spacing: 2px; margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.3); text-align: center; padding: 0 15px; }
        .logo { width: 280px; max-width: 85%; margin: -40px auto 10px auto; background: rgba(255, 255, 255, 0.98); padding: 12px 25px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; z-index: 10; display: block; }

        #loading { padding: 40px; color: var(--verde-oscuro); font-weight: 500; }
        .servicio { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 6px 20px rgba(0,0,0,0.04); display: flex; flex-direction: column; justify-content: space-between; min-height: 250px; text-align: left; border: 1px solid #f0f0f0; }
        .servicio-media { margin: -10px -10px 16px; border-radius: 18px; overflow: hidden; box-shadow: 0 12px 26px rgba(30, 48, 37, 0.14); aspect-ratio: 16 / 10; background: linear-gradient(135deg, #eef6f0 0%, #f8fbf8 100%); }
        .servicio-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .servicio h3 { margin: 0; font-family: 'Playfair Display', serif; font-size: 20px; color: #2c3e3a; }
        .servicio-head { display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: start; margin-bottom: 12px; }
        .servicio-icono { width: 44px; height: 44px; border-radius: 14px; display: grid; place-items: center; background: linear-gradient(145deg, #eef8f2 0%, #e3f3ea 100%); border: 1px solid #d8ebe0; font-size: 22px; line-height: 1; box-shadow: 0 8px 18px rgba(114, 189, 153, 0.12); }
        .btn-reservar { margin-top: 20px; background: var(--verde-mimar); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 600; width: 100%; }
        .footer { margin-top: 40px; font-size: 11px; color: #999; padding: 30px 0; text-align: center; border-top: 1px solid #e0e6e4; }

        @media (min-width: 1024px) {
            .modal-overlay {
                background: rgba(16, 26, 23, 0.52);
                backdrop-filter: blur(14px);
            }

            .modal-card {
                background: rgba(255, 255, 255, 0.92);
                backdrop-filter: blur(14px);
            }
        }

        @media (max-width: 768px) {
            .hero { height: 176px; }
            .hero h1 { font-size: 34px; letter-spacing: 1px; }
            .container { width: min(100%, 100% - 24px); padding: 0 0 40px; text-align: center; }
            .logo { width: min(72vw, 238px); margin-top: -28px; padding: 10px 18px; border-radius: 18px; }
            .servicios { grid-template-columns: 1fr; gap: 14px; }
            .servicio { min-height: 220px; padding: 20px; }
            .servicio-media { margin: -6px -6px 14px; border-radius: 16px; }
            .modal-overlay {
                align-items: flex-end;
                background: rgba(17, 24, 22, 0.66);
                backdrop-filter: blur(6px);
            }
            .modal-card {
                max-width: 100%;
                max-height: min(82dvh, 760px);
                padding: 24px 18px 18px;
                border-radius: 28px 28px 22px 22px;
                background: rgba(255, 255, 255, 0.97);
            }
        }

        @media (max-width: 480px) {
            .hero { height: 160px; }
            .hero h1 { font-size: 30px; }
            .turno-item { padding: 16px; }
            .modal-card h2 { font-size: 26px; }
        }
    </style>
    <link rel="stylesheet" href="/pro-theme.css"></head>

<body>
    <div class="hero">
        <h1>Nuestros Servicios</h1>
    </div>

    <div class="container">
        <img src="img/logo.png" class="logo">
        
        <div style="text-align:center;margin:20px 0 30px;">
            <button id="btnKitFacial" class="btn-reservar" style="max-width:320px;background:linear-gradient(135deg,#d4a573,#b8956a);">🧴 Solicitar Kit Facial Domiciliario</button>
        </div>

        <div id="loading">Cargando experiencias...</div>
        <div class="servicios" id="listaServicios"></div>
    </div>

    <div id="modalKitNoCliente" class="modal-overlay">
        <div class="modal-card">
            <h2 style="font-family:'Playfair Display',serif;color:#2c3e3a;margin:0 0 12px;text-align:center;">Kit Facial Domiciliario</h2>
            <p style="color:#5a6b64;font-size:14px;line-height:1.6;margin:0 0 16px;text-align:center;">Para solicitar tu kit facial y formar parte del programa de cuidado domiciliario de Espacio Mimar T, primero tenés que estar registrado/a como paciente.</p>
            <p style="color:#5a6b64;font-size:14px;line-height:1.6;margin:0 0 20px;text-align:center;">Hablá con Gimena para poder sumarte:</p>
            <a id="waLinkKit" href="#" style="display:block;background:#25D366;color:white;text-decoration:none;padding:14px;border-radius:12px;font-weight:600;text-align:center;font-size:15px;">💬 Hablar con Gimena</a>
            <button onclick="document.getElementById('modalKitNoCliente').style.display='none'" style="width:100%;margin-top:12px;padding:12px;background:#f1f3f2;border:none;border-radius:12px;color:#55625d;font-weight:600;cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs } from "/js/firebase-web.js";
        
        const contenedor = document.getElementById("listaServicios");
        const loading = document.getElementById("loading");
        const SERVICIO_LED_NOMBRE = "Facial LED Regenerativo";

        const SERVICIO_CORPORAL_NOMBRE = "Sesión Corporal Combinada por Zona";
        const SERVICIO_CORPORAL_RESUMEN = `Tratamiento integral que combina distintas tecnologías para mejorar la flacidez, celulitis, estrías, retención de líquidos y tono muscular.\nSe trabaja de forma personalizada según la necesidad de la zona, estimulando el colágeno, mejorando la textura de la piel y favoreciendo el drenaje y la activación muscular.\n\n<strong>Importante</strong>\nCada sesión corresponde a una sola zona (abdomen, flancos, glúteos o zona subglútea).\nSi se desean trabajar dos zonas, se deben reservar sesiones adicionales.\n\n<strong>Plan de tratamiento</strong>\nSe recomienda un mínimo de 6 sesiones por zona para lograr resultados visibles y duraderos.`;

        const SERVICIO_BRAZOS_NOMBRE = "💎 Reafirmación Integral de Brazos";
        const SERVICIO_BRAZOS_RESUMEN = `Tratamiento orientado a mejorar la flacidez del brazo mediante un abordaje integral que contempla tanto la calidad de la piel como el sostén del tejido.\n\nLa pérdida de firmeza puede estar asociada a distintos factores, como el paso del tiempo, cambios de peso o disminución del tono muscular. Por este motivo, cada caso requiere una evaluación personalizada para definir la estrategia más adecuada.\n\nEl objetivo es lograr una mejora progresiva en la firmeza, la textura y el contorno del brazo, respetando siempre las características propias de cada piel.\n\n<strong>🎯 Objetivos del tratamiento</strong>\n- Mejorar la firmeza del brazo\n- Optimizar la calidad de la piel\n- Favorecer el sostén del tejido\n- Redefinir el contorno\n- Disminuir la apariencia de flacidez\n\n<strong>⚙️ Modalidad de trabajo</strong>\nEl tratamiento se adapta a cada paciente, pudiendo combinar diferentes abordajes según la evaluación profesional, considerando si predomina la flacidez, alteraciones en la calidad de la piel o cambios en el volumen del tejido.\n\n<strong>📅 Plan de tratamiento</strong>\nSe requieren varias sesiones para lograr resultados visibles y sostenidos en el tiempo. La frecuencia y cantidad se definen de manera personalizada según cada caso.\n\n<strong>⚠️ Consideraciones</strong>\nEste tratamiento no reemplaza procedimientos médicos ni quirúrgicos. En casos de flacidez avanzada, los resultados serán progresivos y acordes a las características del tejido.\n\n<strong>💬 Enfoque profesional</strong>\nEn Espacio Mimar T trabajamos con un criterio dermocosmiátrico, priorizando la evaluación individual y la selección adecuada de cada protocolo para lograr resultados reales y seguros.`;

        function obtenerEmojiServicio(nombre) {
            const normalizado = (nombre || "").toLowerCase();
            if (normalizado.includes("led") || normalizado.includes("facial")) return "✨";
            if (normalizado.includes("corporal") || normalizado.includes("zona")) return "🌿";
            if (normalizado.includes("brazo")) return "💎";
            if (normalizado.includes("limpieza")) return "🫧";
            if (normalizado.includes("antiage") || normalizado.includes("rejuven")) return "🌸";
            return "🤍";
        }

        function limpiarTituloServicio(nombre) {
            return (nombre || "").replace(/^(\s|[^A-Za-zÁÉÍÓÚáéíóúÑñ0-9])+/, "").trim();
        }

        function obtenerImagenServicio(nombre) {
            const normalizado = (nombre || "").toLowerCase();
            if (normalizado.includes("manchas")) return "";
            if (normalizado.includes("led")) return "img/facial.jpg";
            if (normalizado.includes("corporal combinada") || normalizado.includes("tratamientos corporales") || normalizado.includes("crio")) return "img/criolipolisis.jpg";
            if (normalizado.includes("brazo") || normalizado.includes("reafirm")) return "img/mioup.jpg";
            return "";
        }

        // Carga inicial de servicios
        async function cargarServicios() {
            try {
                const snapshot = await getDocs(collection(db, "services"));
                let servicios = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.activo) servicios.push(data);
                });

                const yaExisteServicioLED = servicios.some(
                    s => (s.nombre || "").trim().toLowerCase() === SERVICIO_LED_NOMBRE.toLowerCase()
                );
                const yaExisteServicioCorporal = servicios.some(
                    s => (s.nombre || "").trim().toLowerCase() === SERVICIO_CORPORAL_NOMBRE.toLowerCase()
                );
                const yaExisteServicioBrazos = servicios.some(
                    s => (s.nombre || "").trim().toLowerCase() === SERVICIO_BRAZOS_NOMBRE.toLowerCase()
                );

                if (!yaExisteServicioLED) {
                    const ordenMax = servicios.reduce((max, s) => Math.max(max, Number(s.orden) || 0), 0);
                    servicios.push({
                        nombre: SERVICIO_LED_NOMBRE,
                        duracion: 30,
                        descripcion: SERVICIO_LED_RESUMEN,
                        orden: ordenMax + 1,
                        activo: true
                    });
                }

                if (!yaExisteServicioCorporal) {
                    const ordenMax = servicios.reduce((max, s) => Math.max(max, Number(s.orden) || 0), 0);
                    servicios.push({
                        nombre: SERVICIO_CORPORAL_NOMBRE,
                        duracion: 60,
                        descripcion: SERVICIO_CORPORAL_RESUMEN,
                        orden: ordenMax + 1,
                        activo: true
                    });
                }

                if (!yaExisteServicioBrazos) {
                    const ordenMax = servicios.reduce((max, s) => Math.max(max, Number(s.orden) || 0), 0);
                    servicios.push({
                        nombre: SERVICIO_BRAZOS_NOMBRE,
                        duracion: 60,
                        descripcion: SERVICIO_BRAZOS_RESUMEN,
                        orden: ordenMax + 1,
                        activo: true
                    });
                }


                servicios.sort((a, b) => a.orden - b.orden);
                loading.style.display = "none";
                servicios.forEach(s => {
                    const div = document.createElement("div");
                    div.className = "servicio";
                    const descFormateada = (s.descripcion || '').replace(/\n/g, '<br>');
                    const tituloLimpio = limpiarTituloServicio(s.nombre);
                    const emoji = obtenerEmojiServicio(s.nombre);
                    const imagenServicio = obtenerImagenServicio(s.nombre);
                    const bloqueImagen = imagenServicio ? `<div class="servicio-media"><img src="${imagenServicio}" alt="${tituloLimpio}"></div>` : "";
                    div.innerHTML = `<div>${bloqueImagen}<div class="servicio-head"><div class="servicio-icono" aria-hidden="true">${emoji}</div><div><h3>${tituloLimpio}</h3><div class="duracion">${s.duracion} min</div></div></div><p>${descFormateada}</p></div><button class="btn-reservar" data-nombre="${s.nombre}">Reservar Turno</button>`;
                    contenedor.appendChild(div);
                });
                document.querySelectorAll('.btn-reservar').forEach(btn => {
                    btn.addEventListener('click', () => {
                        localStorage.setItem("jornadaModo", "0");
                        localStorage.removeItem("jornadaSource");
                        localStorage.setItem("servicioSeleccionado", btn.getAttribute('data-nombre'));
                        window.location.href = "fecha.html";
                    });
                });
            } catch (e) { console.error(e); }
        }

        window.onclick = (e) => { if (e.target.classList.contains('modal-overlay')) e.target.style.display = "none"; };

        document.getElementById("btnKitFacial").onclick = () => {
            const dni = localStorage.getItem("clienteDNI");
            const nombre = localStorage.getItem("clienteNombre");
            
            if (dni && nombre && dni !== "null" && nombre !== "null") {
                window.location.href = "/kit-facial.html";
                return;
            }

            const numeroGimena = "5493764291807";
            const mensaje = "Hola! Quiero información sobre el kit facial domiciliario de Espacio Mimar T";
            const waUrl = `https://wa.me/${numeroGimena}?text=${encodeURIComponent(mensaje)}`;
            document.getElementById("waLinkKit").href = waUrl;
            document.getElementById("modalKitNoCliente").style.display = "flex";
        };

        cargarServicios();
    </script>
    <script src="/js/shared-footer.js"></script>
    <script src="/js/mimi-bot.js"></script>
</body>
</html>
