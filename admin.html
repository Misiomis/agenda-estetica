<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6f8a6d">
    <link rel="apple-touch-icon" href="img/panel.png">
    <title>Gimena Knack | Admin Mimar T</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --fondo: #f4fbf7; --texto: #2f5a47; --accento: #4ea37f; 
            --accento-oscuro: #2f7c5d; --verde: #72bd99; --verde-oscuro: #3f8f6f; 
            --azul: #4a90e2; --rojo: #e05252; --whatsapp: #25D366; 
            --suave: #dff3ea; --suave-oscuro: #bfe6d5; --nude: #f7fffb; 
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(180deg, #f8fdfb 0%, #edf8f3 100%); 
            margin: 0; color: var(--texto); padding-bottom: 50px; 
            font-size: 15px; line-height: 1.45; 
        }

        /* LOGIN OVERLAY - Control de visibilidad crítico */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #f4f7f6; z-index: 100000; 
            display: flex; align-items: center; justify-content: center; 
        }

        .login-box { 
            background: white; padding: 40px; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 90%; max-width: 350px; text-align: center; 
        }

        .login-box h2 { font-family: 'Playfair Display', serif; color: var(--accento-oscuro); margin-bottom: 25px; }
        .login-box input { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            border: 2px solid #d5eadf; border-radius: 12px; 
            box-sizing: border-box; font-size: 16px; outline: none; 
        }

        .btn-entrar { 
            width: 100%; padding: 15px; background: var(--accento); 
            color: white; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: 600; font-size: 16px; 
        }

        /* PANEL DE ADMIN (Oculto por defecto) */
        #admin-content { display: none; }

        /* NAVEGACIÓN Y COMPONENTES */
        .header { 
            background: #fff; padding: 14px 16px; text-align: center; 
            border-bottom: 1px solid #dceee5; position: sticky; 
            top: 0; z-index: 100; box-shadow: 0 4px 18px rgba(0,0,0,0.06); 
        }
        
        .header h2 { color: var(--accento); font-size: clamp(1.2rem, 2.2vw, 1.7rem); margin: 0; }

        .menu-nav { margin-top: 10px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .btn-nav { 
            padding: 10px 18px; min-height: 40px; border: 1px solid #cfe9dd; 
            background: #fff; border-radius: 999px; cursor: pointer; 
            font-weight: 600; font-size: 13px; color: var(--texto); 
        }
        .btn-nav.active { background: #e9f7f0; color: var(--accento-oscuro); border-color: #a9d9c3; }

        .container { max-width: 1024px; margin: 18px auto; padding: 0 16px; }
        .section { display: none; }
        .section.active { display: block; }

        /* RECUADROS Y CARDS */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 14px; }
        .kpi-card { background: #fff; border: 1px solid #d9eee4; border-radius: 14px; padding: 12px; box-shadow: 0 6px 14px rgba(72,133,106,0.08); }
        .kpi-label { font-size: 11px; color: #6a8e7f; font-weight: 700; text-transform: uppercase; }
        .kpi-value { font-size: 1.5rem; font-weight: 700; color: var(--verde-oscuro); }

        .detalle-dia-card { 
            background: #fff; border-radius: 16px; padding: 14px; 
            margin-top: 14px; border-left: 6px solid #79c6a1; 
            box-shadow: 0 8px 20px rgba(94,153,124,0.16); 
        }

        /* Estilos de botones rápidos */
        .btn-mini { 
            border: 1px solid #b7dfcc; background: #ffffff; color: var(--verde-oscuro); 
            border-radius: 999px; padding: 9px 13px; cursor: pointer; font-weight: 700; font-size: 12px; 
        }

        /* Mobile Fixes Inline */
        @media (max-width: 760px) {
            .kpi-grid { grid-template-columns: 1fr 1fr; }
            .menu-nav { overflow-x: auto; white-space: nowrap; justify-content: flex-start; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="font-family:'Playfair Display'">Acceso Mimar T</h2>
            <input type="text" id="userAdmin" placeholder="Email admin">
            <input type="password" id="passAdmin" placeholder="Contraseña">
            <button class="btn-entrar" id="btnEntrarSeguro">Ingresar</button>
            <p id="error-login" style="color:red; font-size:13px; margin-top:10px; display:none;">Datos incorrectos</p>
        </div>
    </div>

    <div id="admin-content">
        <div class="header">
            <h2>Gimena Knack | Panel</h2>
            <div class="menu-nav">
                <button class="btn-nav active" onclick="verSeccion('agenda')">Agenda</button>
                <button class="btn-nav" onclick="verSeccion('historias')">Historias</button>
                <button class="btn-nav" onclick="verSeccion('clientes')">Pacientes</button>
                <button class="btn-nav" onclick="cerrarSesion()">Salir</button>
            </div>
        </div>

        <div class="container">
            <div id="sec-agenda" class="section active">
                <div class="kpi-grid">
                    <div class="kpi-card"><div class="kpi-label">Reservas totales</div><div class="kpi-value">24</div></div>
                    <div class="kpi-card"><div class="kpi-label">Turnos hoy</div><div class="kpi-value">5</div></div>
                </div>
                
                <div class="detalle-dia-card">
                    <h3>Gestión de turnos</h3>
                    <p>Seleccioná un día en el calendario para ver los detalles.</p>
                    </div>
            </div>

            <div id="sec-clientes" class="section">
                <div class="detalle-dia-card">
                    <h3>Listado de Pacientes</h3>
                    <input type="text" class="btn-mini" style="width:100%; margin-bottom:10px" placeholder="Buscar por nombre...">
                    <div id="contenedorClientes"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Función para simular el ingreso (aquí conectarías con Firebase)
        document.getElementById('btnEntrarSeguro').addEventListener('click', function() {
            const user = document.getElementById('userAdmin').value;
            const pass = document.getElementById('passAdmin').value;

            // Validación simple para testeo (reemplazar con Firebase Auth)
            if(user === "admin" && pass === "1234") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
            } else {
                const err = document.getElementById('error-login');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
            }
        });

        // Navegación entre secciones
        function verSeccion(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            
            document.getElementById('sec-' + id).classList.add('active');
            event.target.classList.add('active');
        }

        function cerrarSesion() {
            location.reload(); // Forma rápida de resetear el estado
        }
    </script>
</body>
</html>
