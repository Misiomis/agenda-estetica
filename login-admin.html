<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimena Knack | Login admin</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile-fixes.css">
    <link rel="stylesheet" href="/pro-theme.css">

    <style>
        body {
            background-color: #fff8f5; /* Fondo suave acorde a la marca */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            color: #381917;
            font-family: 'Cormorant Garamond', serif;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            max-width: 300px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #edc0b7;
            border-radius: 8px;
            outline: none;
        }

        button {
            width: 100%;
            max-width: 300px;
            padding: 14px;
            background: #ef233c;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #a10f25;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
            padding-bottom: 30px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Acceso Administrativo</h1>

        <input type="text" id="adminUser" placeholder="Usuario">
        <input type="password" id="adminPass" placeholder="Contraseña">
        
        <button onclick="loginAdmin()">Ingresar</button>

        <p id="errorMsg" style="color:red; margin-top: 10px;"></p>
    </div>

    <div class="footer">
        © 2026 Espacio Mimar T — Todos los derechos reservados
    </div>

    <script>
        const ADMIN_USER = "gimena";
        const ADMIN_PASS = "Mimar2026";

        function loginAdmin() {
            const user = document.getElementById("adminUser").value;
            const pass = document.getElementById("adminPass").value;

            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                localStorage.setItem("adminAuth", "true");
                window.location.href = "admin.html";
            } else {
                document.getElementById("errorMsg").innerText = "Datos incorrectos";
            }
        }
    </script>

    <script src="/js/shared-footer.js"></script>
</body>
</html>
