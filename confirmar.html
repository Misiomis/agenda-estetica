<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimena Knack | Confirmar Turno</title>
    
    <link rel="stylesheet" href="mobile-fixes.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --red-700: #9f1024;
            --red-600: #cf1d35;
            --red-500: #ff5a5f;
            --red-100: #fff0f1;
            --ink: #331f22;
            --muted: #7b6165;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 85% 10%, rgba(255, 90, 95, 0.2), rgba(255, 90, 95, 0) 45%),
                radial-gradient(circle at 10% 90%, rgba(159, 16, 36, 0.16), rgba(159, 16, 36, 0) 42%),
                linear-gradient(135deg, #fff9fa 0%, #fff0f1 60%, #ffe8ea 100%);
            font-family: 'Montserrat', sans-serif;
            color: var(--ink);
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(207, 29, 53, 0.24);
            border-radius: 22px;
            box-shadow: 0 20px 45px rgba(117, 18, 33, 0.16);
            padding: 26px;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 1.5rem;
            color: var(--red-700);
            text-align: center;
        }

        .summary {
            background: var(--red-100);
            border: 1px solid rgba(207, 29, 53, 0.2);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 16px;
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .summary p { margin: 6px 0; }
        .summary strong { color: var(--red-700); }

        .label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--red-700);
        }

        textarea {
            width: 100%;
            min-height: 84px;
            border-radius: 12px;
            border: 1px solid #efc3c8;
            padding: 11px 12px;
            font: inherit;
            resize: vertical;
            background: #fffcfc;
            outline: none;
        }

        textarea:focus { border-color: var(--red-500); }

        .hint {
            margin-top: 7px;
            color: var(--muted);
            font-size: 0.86rem;
        }

        .status {
            min-height: 20px;
            margin-top: 10px;
            color: var(--red-700);
            font-size: 0.92rem;
            text-align: center;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 13px 18px;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            margin-top: 12px;
            background: linear-gradient(135deg, var(--red-500), var(--red-600));
            color: #fff;
            box-shadow: 0 12px 26px rgba(159, 16, 36, 0.3);
            transition: all 0.2s ease;
        }

        .btn:hover:not(:disabled) { transform: translateY(-1px); opacity: 0.9; }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }

        #modalOk {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            z-index: 1000;
        }

        .modal-card {
            width: 100%;
            max-width: 430px;
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            text-align: center;
        }

        .modal-card h2 { color: var(--red-700); margin-top: 0; }

        .btn-secondary {
            margin-top: 10px;
            background: #fff4f5;
            color: var(--red-700);
            box-shadow: none;
            border: 1px solid #f0d1d5;
        }

        @media (min-width: 1024px) {
            .card { backdrop-filter: blur(14px); background: rgba(255, 255, 255, 0.9); }
        }

        @media (max-width: 640px) {
            body { align-items: stretch; padding: 14px; }
            .card { margin: auto; padding: 20px 16px; border-radius: 18px; }
            #modalOk { align-items: flex-end; }
            .modal-card { border-radius: 24px 24px 18px 18px; }
        }
    </style>
    <link rel="stylesheet" href="/pro-theme.css">
</head>
<body>
    <div class="card">
        <h1>Confirmar turno</h1>
        <div class="summary">
            <p>Paciente: <strong id="txtNombre">Cargando...</strong></p>
            <p>Servicio: <strong id="txtServicio">Cargando...</strong></p>
            <p>Fecha y hora: <strong><span id="txtFecha">-</span> a las <span id="txtHora">-</span></strong></p>
        </div>

        <label class="label" for="telefonos">Números de WhatsApp para aviso</label>
        <textarea id="telefonos" placeholder="Ejemplo: 5491122334455, 5491166677788"></textarea>
        <div class="hint">Podes cargar uno o varios números separados por coma.</div>

        <div id="status" class="status"></div>
        <button id="btnConfirmar" class="btn" type="button">Confirmar y enviar aviso</button>
    </div>

    <div id="modalOk">
        <div class="modal-card">
            <h2>¡Turno confirmado!</h2>
            <p id="resultadoFinal">La reserva se guardó correctamente.</p>
            <button class="btn" onclick="window.location.href='index.html'">Volver al inicio</button>
            <button class="btn btn-secondary" onclick="window.location.href='jornada.html'">Ver mis turnos</button>
        </div>
    </div>

    <script type="module">
        import { db, collection, addDoc, doc, getDoc } from "/js/firebase-web.js";

        const CF_CONFIRM_URL = "https://us-central1-estetica-8d067.cloudfunctions.net/enviarConfirmacionTurno";

        // Obtener datos de localStorage
        const dniLs = localStorage.getItem("clienteDNI") || "";
        const nombreLs = localStorage.getItem("clienteNombre") || localStorage.getItem("nombre") || "Paciente";
        const servicioLs = localStorage.getItem("servicioSeleccionado") || "Servicio Especial";
        const fechaLs = localStorage.getItem("fechaSeleccionada") || "Pendiente";
        const horaLs = localStorage.getItem("horaSeleccionada") || "00:00";
        const phoneFallback = (localStorage.getItem("clientePhoneIngresado") || "").trim();

        const txtNombre = document.getElementById("txtNombre");
        const txtServicio = document.getElementById("txtServicio");
        const txtFecha = document.getElementById("txtFecha");
        const txtHora = document.getElementById("txtHora");
        const telefonosEl = document.getElementById("telefonos");
        const statusEl = document.getElementById("status");
        const btnConfirmar = document.getElementById("btnConfirmar");

        // Formatear fecha para que sea legible (ej: 17 de abril)
        const formatearFecha = (fecha) => {
            if (!fecha || fecha === "Pendiente") return fecha;
            const [y, m, d] = fecha.split("-").map(Number);
            const dateObj = new Date(y, m - 1, d);
            return new Intl.DateTimeFormat("es-AR", { day: "numeric", month: "long" }).format(dateObj);
        };

        txtNombre.innerText = nombreLs;
        txtServicio.innerText = servicioLs;
        txtFecha.innerText = formatearFecha(fechaLs);
        txtHora.innerText = horaLs + " hs";

        const parseTelefonos = (raw) => {
            return String(raw || "").split(/[\n,;]+/).map(v => v.trim()).filter(Boolean);
        };

        async function sugerirTelefono() {
            if (!dniLs) { telefonosEl.value = phoneFallback; return; }
            try {
                const snap = await getDoc(doc(db, "clients", dniLs));
                if (snap.exists()) {
                    const d = snap.data();
                    telefonosEl.value = d.phone || d.telefono || d.whatsapp || phoneFallback;
                } else {
                    telefonosEl.value = phoneFallback;
                }
            } catch (e) { telefonosEl.value = phoneFallback; }
        }

        async function llamarBackend({ tel = "", descontar = false, soloBalance = false }) {
            try {
                const res = await fetch(CF_CONFIRM_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        nombre: nombreLs,
                        servicio: servicioLs,
                        fecha: fechaLs,
                        hora: horaLs + " hs",
                        telefono: tel,
                        dni: dniLs,
                        descontarBalance: descontar,
                        omitirWhatsapp: soloBalance
                    })
                });
                return { ok: res.ok, data: await res.json().catch(() => ({})) };
            } catch (e) { return { ok: false }; }
        }

        async function procesarConfirmacion() {
            btnConfirmar.disabled = true;
            btnConfirmar.textContent = "Procesando...";
            statusEl.textContent = "";

            try {
                const tels = parseTelefonos(telefonosEl.value);
                const principal = tels[0] || "";
                
                // 1. Guardar en Firestore
                await addDoc(collection(db, "reservas"), {
                    cliente: nombreLs,
                    dni: dniLs,
                    servicio: servicioLs,
                    fecha: fechaLs,
                    hora: horaLs,
                    telefono: principal,
                    status: "confirmado",
                    timestamp: new Date()
                });

                // 2. Notificaciones y Balance
                if (tels.length > 0) {
                    statusEl.textContent = "Enviando avisos por WhatsApp...";
                    for (const [i, t] of tels.entries()) {
                        await llamarBackend({ tel: t, descontar: (i === 0 && !!dniLs) });
                    }
                } else {
                    await llamarBackend({ descontar: !!dniLs, soloBalance: true });
                }

                document.getElementById("modalOk").style.display = "flex";
            } catch (error) {
                console.error(error);
                statusEl.textContent = "Error al confirmar. Reintentá.";
                btnConfirmar.disabled = false;
                btnConfirmar.textContent = "Reintentar";
            }
        }

        sugerirTelefono();
        btnConfirmar.addEventListener("click", procesarConfirmacion);
    </script>
    <script src="/js/shared-footer.js"></script>
    <script src="/js/mimi-bot.js"></script>
</body>
</html>
