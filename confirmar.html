<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Turno | Espacio Mimar T</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --red-700: #9f1024;
            --red-600: #cf1d35;
            --red-500: #ff5a5f;
            --red-100: #fff0f1;
            --ink: #331f22;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center; /* Centrado vertical */
            justify-content: center; /* Centrado horizontal */
            background: linear-gradient(135deg, #fff9fa 0%, #ffe8ea 100%);
            font-family: 'Montserrat', sans-serif;
            color: var(--ink);
            padding: 16px;
        }

        .card {
            width: 100%;
            max-width: 400px; /* Tamaño ideal para celu */
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(159, 16, 36, 0.1);
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(207, 29, 53, 0.1);
        }

        .logo-placeholder {
            color: var(--red-700);
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 1.4rem;
            color: var(--red-700);
            margin: 0 0 20px;
        }

        .details-box {
            background: var(--red-100);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
        }

        .details-box p {
            margin: 8px 0;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(159, 16, 36, 0.05);
            padding-bottom: 4px;
        }

        .details-box strong {
            color: var(--red-700);
            display: block;
            font-size: 1.05rem;
        }

        .btn-confirmar {
            width: 100%;
            background: linear-gradient(135deg, var(--red-500), var(--red-600));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(207, 29, 53, 0.3);
            transition: transform 0.2s;
        }

        .btn-confirmar:active {
            transform: scale(0.98);
        }

        .btn-confirmar:disabled {
            background: #ccc;
            box-shadow: none;
        }

        #statusMsg {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--red-600);
            min-height: 1.2rem;
        }

        /* Modal de éxito */
        #modalOk {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 320px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-placeholder">MIMAR T</div>
        <h1>Confirmar Reserva</h1>
        
        <div class="details-box">
            <p>Servicio: <strong id="lblServicio">-</strong></p>
            <p>Fecha: <strong id="lblFecha">-</strong></p>
            <p>Hora: <strong id="lblHora">-</strong></p>
        </div>

        <button id="btnEjecutar" class="btn-confirmar">Confirmar y Notificar</button>
        <div id="statusMsg"></div>
    </div>

    <div id="modalOk">
        <div class="modal-content">
            <h2 style="color: var(--red-700)">¡Listo!</h2>
            <p>Tu turno ha sido confirmado y el aviso enviado.</p>
            <button class="btn-confirmar" onclick="window.location.href='index.html'">Finalizar</button>
        </div>
    </div>

    <script type="module">
        import { db, doc, getDoc, collection, addDoc } from "/js/firebase-web.js";

        const btn = document.getElementById("btnEjecutar");
        const status = document.getElementById("statusMsg");

        // Datos del turno
        const nombre = localStorage.getItem("clienteNombre") || "Cliente";
        const dni = localStorage.getItem("clienteDNI") || "";
        const servicio = localStorage.getItem("servicioSeleccionado") || "Tratamiento";
        const fecha = localStorage.getItem("fechaSeleccionada") || "-";
        const hora = localStorage.getItem("horaSeleccionada") || "-";

        document.getElementById("lblServicio").innerText = servicio;
        document.getElementById("lblFecha").innerText = fecha;
        document.getElementById("lblHora").innerText = hora + " hs";

        async function enviarNotificacionMeta(telefono) {
            const urlMeta = "https://us-central1-estetica-8d067.cloudfunctions.net/enviarWhatsAppReserva"; 
            try {
                await fetch(urlMeta, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        telefono: telefono,
                        nombre: nombre,
                        servicio: servicio,
                        fecha: fecha,
                        hora: hora
                    })
                });
            } catch (e) { console.error("Error Meta API", e); }
        }

        btn.addEventListener("click", async () => {
            btn.disabled = true;
            status.innerText = "Procesando tu reserva...";

            try {
                // 1. Obtener teléfono (invisible al usuario)
                let telefonoFinal = localStorage.getItem("clientePhoneIngresado") || "";
                if (dni) {
                    const snap = await getDoc(doc(db, "clients", dni));
                    if (snap.exists()) {
                        telefonoFinal = snap.data().phone || snap.data().whatsapp || telefonoFinal;
                    }
                }

                // 2. Guardar en Firestore
                await addDoc(collection(db, "reservas"), {
                    cliente: nombre,
                    dni: dni,
                    servicio: servicio,
                    fecha: fecha,
                    hora: hora,
                    timestamp: new Date(),
                    estado: "confirmado"
                });

                // 3. Notificar vía Meta
                if (telefonoFinal) {
                    await enviarNotificacionMeta(telefonoFinal);
                }

                document.getElementById("modalOk").style.display = "flex";
            } catch (e) {
                status.innerText = "Hubo un error. Intentá de nuevo.";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
