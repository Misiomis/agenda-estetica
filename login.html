<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimena Knack | Registro de credencial</title>

    <link rel="stylesheet" href="mobile-fixes.css">
    <link rel="stylesheet" href="/pro-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --l-ink:    #1a2f24;
            --l-muted:  #56736a;
            --l-accent: #4a6e5c;
            --l-strong: #06402B;
            --l-gold:   #C8A84B;
            --l-border: rgba(140,185,165,0.32);
            --l-trans:  0.22s ease;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            background:
                radial-gradient(ellipse 900px 700px at 15% -5%,  rgba(74,110,92,0.11),  transparent 58%),
                radial-gradient(ellipse 700px 600px at 88% 95%,  rgba(114,189,153,0.09), transparent 54%),
                radial-gradient(ellipse 500px 400px at 5%  80%,  rgba(62,136,106,0.07),  transparent 52%),
                linear-gradient(180deg, #f7fbf8 0%, #eef5f0 55%, #e6f0e9 100%);
        }

        body::before {
            content: "";
            position: fixed;
            top: -120px; right: -100px;
            width: 420px; height: 420px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(74,110,92,0.09) 0%, transparent 68%);
            pointer-events: none;
            filter: blur(24px);
        }

        body::after {
            content: "";
            position: fixed;
            bottom: -80px; left: -80px;
            width: 320px; height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(114,189,153,0.10) 0%, transparent 68%);
            pointer-events: none;
            filter: blur(20px);
        }

        /* ── CARD ── */
        .container {
            background:
                radial-gradient(circle at 96% 4%, rgba(74,110,92,0.055), transparent 30%),
                linear-gradient(170deg, rgba(255,255,255,0.98) 0%, rgba(246,251,248,0.98) 100%);
            padding: 0;
            border-radius: 28px;
            text-align: center;
            box-shadow:
                0 36px 72px rgba(16,36,26,0.16),
                0 10px 24px rgba(16,36,26,0.08),
                inset 0 1px 0 rgba(255,255,255,1);
            max-width: 440px;
            width: 94%;
            border: 1px solid rgba(130,175,152,0.22);
            position: relative;
            z-index: 2;
            overflow: hidden;
            backdrop-filter: blur(14px);
            animation: cardIn 0.45s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(22px) scale(0.97); }
            to   { opacity: 1; transform: none; }
        }

        /* barra dorada superior */
        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg,
                rgba(200,168,75,0) 0%,
                rgba(200,168,75,0.85) 28%,
                rgba(74,110,92,0.9) 72%,
                rgba(200,168,75,0) 100%
            );
            opacity: 1;
            border-radius: 28px 28px 0 0;
        }

        .container-inner { padding: 40px 40px 36px; }

        /* ── LOGO & BRAND ── */
        .logo {
            width: 156px;
            margin-bottom: 16px;
            filter: drop-shadow(0 10px 20px rgba(30,60,45,0.15));
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .nombre {
            font-family: 'Cormorant Garamond', serif;
            font-size: 27px;
            font-style: italic;
            font-weight: 600;
            color: var(--l-ink);
            letter-spacing: 0.01em;
            line-height: 1.1;
        }

        .credenciales {
            font-size: 10.5px;
            color: var(--l-muted);
            margin-top: 6px;
            line-height: 1.7;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* divisor dorado */
        .brand-divider {
            width: 52px;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, rgba(200,168,75,0.65), transparent);
            margin: 20px auto 20px;
            border-radius: 999px;
        }

        .descripcion {
            font-size: 13px;
            color: var(--l-muted);
            margin: 0 0 26px;
            line-height: 1.7;
        }

        /* ── FORM HEADER ── */
        .form-section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 21px;
            font-weight: 600;
            color: var(--l-ink);
            margin-bottom: 5px;
        }

        .form-section-sub {
            font-size: 12.5px;
            color: var(--l-muted);
            margin-bottom: 22px;
            line-height: 1.55;
        }

        /* ── INPUTS ── */
        .input-wrap {
            text-align: left;
            margin-bottom: 14px;
        }

        .input-label {
            display: block;
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--l-accent);
            margin-bottom: 7px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1.5px solid var(--l-border);
            font-size: 15px;
            font-family: inherit;
            background: rgba(248,253,250,0.98);
            color: var(--l-ink);
            transition: border-color var(--l-trans), box-shadow var(--l-trans), background var(--l-trans);
            outline: none;
        }

        input:focus {
            border-color: rgba(74,110,92,0.55);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(74,110,92,0.10);
        }

        input::placeholder { color: rgba(80,110,100,0.42); }

        /* ── BOTÓN SUBMIT ── */
        button[type="submit"] {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--l-accent) 0%, var(--l-strong) 55%, #032e1e 100%);
            color: #fff;
            font-family: inherit;
            font-weight: 800;
            font-size: 12.5px;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 18px 36px rgba(6,64,43,0.26), inset 0 1px 0 rgba(200,230,215,0.18);
            transition: transform var(--l-trans), box-shadow var(--l-trans), filter var(--l-trans);
            position: relative;
            overflow: hidden;
            margin-top: 4px;
        }

        button[type="submit"]::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 60%);
            pointer-events: none;
        }

        button[type="submit"]:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 24px 44px rgba(6,64,43,0.34);
            filter: brightness(1.07);
        }

        button[type="submit"]:disabled {
            opacity: 0.68;
            cursor: not-allowed;
            transform: none;
        }

        /* ── ERROR ── */
        #error {
            color: #b84040;
            font-size: 12.5px;
            font-weight: 600;
            margin: -6px 0 12px;
            text-align: left;
        }

        /* ── NO PACIENTE ── */
        #noPacienteMsg p { font-size: 13.5px; color: var(--l-muted); line-height: 1.65; margin-bottom: 6px; }

        #waLinkNoPaciente {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            background: linear-gradient(135deg, #1a8c50 0%, #25D366 100%);
            color: #fff;
            text-decoration: none;
            padding: 15px;
            border-radius: 999px;
            font-weight: 800;
            font-size: 12px;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-top: 16px;
            box-shadow: 0 14px 30px rgba(37,211,102,0.26);
            transition: transform var(--l-trans), box-shadow var(--l-trans);
        }

        #waLinkNoPaciente:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 36px rgba(37,211,102,0.34);
        }

        @media (max-width: 480px) {
            .container-inner { padding: 30px 22px 26px; }
            .logo { width: 138px; }
            .nombre { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="container">
  <div class="container-inner">
    <img src="img/logo.png" class="logo" alt="Espacio Mimar T">

    <div class="nombre">Gimena Knack</div>

    <div class="credenciales">
        Farmacéutica · MP 1212<br>
        Dermatocosmiatra · RC 2319
    </div>

    <div class="brand-divider"></div>

    <div class="descripcion">
        Completá tus datos para acceder a tu cuenta y gestionar tus turnos.
    </div>

    <div class="form-section-title" id="tituloAcceso">Espacio Mimar T</div>
    <p class="form-section-sub" id="mensajeRedirect">
        Ingresá tu DNI para continuar.
    </p>

    <form id="loginForm">
        <div class="input-wrap">
            <label class="input-label" for="dni">DNI</label>
            <input id="dni" type="text" placeholder="Sin puntos · Ej: 35123456" inputmode="numeric" required>
        </div>
        <p id="error" style="display:none;"></p>
        <button type="submit">Iniciar sesión</button>
    </form>

    <div id="noPacienteMsg" style="display:none; text-align:center; margin-top:8px;">
        <p>No aparecés en nuestro sistema todavía.</p>
        <p>Para formar parte de Espacio Mimar T, escribinos:</p>
        <a id="waLinkNoPaciente" href="#">💬 Escribir por WhatsApp</a>
    </div>
  </div>
</div>

<script type="module">
    import { db, doc, getDoc } from "/js/firebase-web.js";

    const params = new URLSearchParams(window.location.search);
    const redirectTo = params.get("redirect") || "servicios-pro.html";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const dni = document.getElementById("dni").value.trim();
        const error = document.getElementById("error");
        const btn = document.querySelector("button[type='submit']");
        
        if (!dni) {
            error.textContent = "Por favor ingresá tu DNI";
            error.style.display = "block";
            return;
        }
        
        btn.disabled = true;
        btn.textContent = "Verificando...";
        
        try {
            const docRef = doc(db, "clients", dni);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                const cliente = docSnap.data();
                localStorage.setItem("clienteDNI", dni);
                localStorage.setItem("clienteNombre", cliente.fullName);
                window.location.href = redirectTo;
            } else {
                document.getElementById("loginForm").style.display = "none";
                document.getElementById("noPacienteMsg").style.display = "block";
                document.getElementById("mensajeRedirect").style.display = "none";
                document.getElementById("tituloAcceso").style.display = "none";
                
                const numeroGimena = "5493764291807";
                const mensaje = "Hola! Quiero información sobre el kit facial y formar parte de Espacio Mimar T";
                document.getElementById("waLinkNoPaciente").href = `https://wa.me/${numeroGimena}?text=${encodeURIComponent(mensaje)}`;
            }
        } catch (err) {
            error.textContent = "Error al verificar. Intentá de nuevo.";
            error.style.display = "block";
        } finally {
            btn.disabled = false;
            btn.textContent = "Ingresar";
        }
    });
</script>

<script src="/js/shared-footer.js"></script>
<script src="/js/mimi-bot.js"></script>

</body>
</html>
