<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espacio Mimar_T | Agenda</title>

  <link rel="stylesheet" href="style.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f6f7f9;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 520px;
      margin: 80px auto; /* 🔥 controla la posición real */
      background: white;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    label {
      font-size: 14px;
      font-weight: 500;
      margin-top: 12px;
      display: block;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 6px;
      margin-bottom: 15px;
      border-radius: 14px;
      border: 1px solid #e0e0e0;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 18px;
      border: none;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s ease;
      margin-top: 10px;
    }

    #btn-ingresar,
    #btnLogout {
      background: #72bd99;
      color: white;
    }

    #btn-ingresar:hover,
    #btnLogout:hover {
      background: #5fae8b;
    }

    #servicesContainer {
      margin-top: 20px;
      display: grid;
      gap: 10px;
    }

    .btn-servicio {
      background: #f1f1f1;
      padding: 12px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .btn-servicio:hover {
      background: #72bd99;
      color: white;
    }

    .hidden {
      display: none;
    }

    .login-error {
      color: #d63031;
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="container">

  <div id="section-login">
    <h1>Espacio Mimar_T</h1>

    <label>Palabra Clave</label>
    <input type="text" id="usuario">

    <label>Email</label>
    <input type="email" id="email">

    <label>WhatsApp</label>
    <input type="tel" id="whatsapp">

    <button id="btn-ingresar">Ingresar</button>
    <div id="loginError" class="login-error"></div>
  </div>

  <div id="section-agenda" class="hidden">
    <button id="btnLogout">Salir</button>

    <h3>1. Seleccioná un Servicio</h3>
    <div id="servicesContainer"></div>
  </div>

</div>

<script type="module" src="js/script.js"></script>

</body>
</html>
