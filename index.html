<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso | Espacio Mimar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f4f7f6;
font-family:'Poppins',sans-serif;
}

/* TARJETA */

.login-card{

background:white;

padding:70px;

border-radius:24px;

width:520px;

text-align:center;

box-shadow:0 15px 50px rgba(0,0,0,0.08);

}

/* LOGO */

.logo{

width:420px;

max-width:100%;

margin-bottom:35px;

}

/* TITULO */

h2{

font-family:'Playfair Display',serif;

font-size:28px;

color:#2d3748;

margin-bottom:30px;

}

/* INPUT */

input{

width:100%;

padding:15px;

margin-bottom:18px;

border-radius:10px;

border:1px solid #e2e8f0;

font-size:15px;

font-family:'Poppins',sans-serif;

}

/* BOTON */

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#72bd99;

color:white;

font-size:16px;

font-weight:500;

cursor:pointer;

transition:0.25s;

font-family:'Poppins',sans-serif;

}

button:hover{
background:#63a987;
}

#errorMsg{
color:#ff6b6b;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="login-card">

<img src="img/logo.png" class="logo">

<h2>Ingreso clientes</h2>

<form id="loginForm">

<input type="text" id="username" placeholder="Usuario" required>

<input type="text" id="dni" placeholder="DNI" required>

<div id="errorMsg"></div>

<button type="submit">Ingresar</button>

</form>

</div>

<script type="module" src="./js/login.js"></script>

</body>

</html>
