<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espacio Mimar T | Agenda</title>

<style>
:root {
  --primary: #72bd99;
  --primary-dark: #5da685;
  --bg1: #f6fbf9;
  --bg2: #eaf5f1;
  --text: #2e2e2e;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(160deg, var(--bg1), var(--bg2));
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 430px;
}

.card {
  background: white;
  padding: 40px 28px;
  border-radius: 28px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.08);
  animation: fadeIn 0.4s ease;
}

.logo {
  width: 170px;
  display: block;
  margin: 0 auto 25px auto;
}

h1 {
  text-align: center;
  font-size: 1.4rem;
  margin-bottom: 25px;
  color: var(--text);
}

h3 {
  margin-top: 0;
  color: var(--text);
}

label {
  font-size: 0.85rem;
  color: #666;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #ddd;
  margin: 6px 0 16px 0;
  font-size: 1rem;
  transition: 0.2s;
}

input:focus {
  border-color: var(--primary);
  outline: none;
  box-shadow: 0 0 0 3px rgba(114,189,153,0.15);
}

button {
  width: 100%;
  padding: 15px;
  border-radius: 18px;
  border: none;
  background: var(--primary);
  color: white;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
}

#btnLogout {
  background: #e0f0ea;
  color: var(--primary-dark);
  margin-bottom: 20px;
}

#btnLogout:hover {
  background: #d1ebe3;
}

.login-error {
  color: #d63031;
  font-size: 0.9rem;
  margin-top: 8px;
}

#servicesContainer {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

#servicesContainer button {
  background: #f4f4f4;
  color: #333;
  border: 1px solid #e5e5e5;
  border-radius: 16px;
}

#servicesContainer button:hover {
  background: var(--primary);
  color: white;
}

.hidden {
  display: none;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="section-login" class="card">
    <img src="assets/logo.png" class="logo">

    <h1>Agenda Online</h1>

    <label>Palabra Clave</label>
    <input type="text" id="usuario">

    <label>Email</label>
    <input type="email" id="email">

    <label>WhatsApp</label>
    <input type="tel" id="whatsapp">

    <button id="btn-ingresar">Ingresar</button>
    <div id="loginError" class="login-error"></div>
  </div>

  <!-- AGENDA -->
  <div id="section-agenda" class="card hidden">
    <button id="btnLogout">Salir</button>

    <h3>1. Seleccioná un Servicio</h3>
    <div id="servicesContainer"></div>
  </div>

</div>

<script type="module" src="js/script.js"></script>

</body>
</html>
