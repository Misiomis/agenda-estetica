<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espacio Mimar T | Agenda</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="section-login">

    <div style="text-align:center; margin-bottom:30px;">
      <img src="assets/logo.png" style="width:160px;">
    </div>

    <h1 style="text-align:center;">Agenda Online</h1>

    <label>Palabra Clave</label>
    <input type="text" id="usuario" placeholder="Ej: CASA AZUL">

    <label>Email</label>
    <input type="email" id="email" placeholder="tuemail@gmail.com">

    <label>WhatsApp</label>
    <input type="tel" id="whatsapp" placeholder="Ej: 3755...">

    <button id="btn-ingresar">Ingresar</button>

    <div id="loginError" class="login-error"></div>

  </div>


  <!-- AGENDA -->
  <div id="section-agenda" class="hidden">

    <button id="btnLogout">Salir</button>

    <h2 style="margin-bottom:15px;">Seleccioná un Servicio</h2>

    <div id="servicesContainer"></div>

  </div>

</div>

<script type="module" src="js/script.js"></script>

</body>
</html>
